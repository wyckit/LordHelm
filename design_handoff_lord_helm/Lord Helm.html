<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Lord Helm · Command Center</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/tokens.css">
  <style>
    /* Canvas-specific overrides so each artboard renders its own Dashboard */
    .dashboard-root { height: 100%; width: 100%; overflow: hidden; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="widgets-core.jsx"></script>
  <script type="text/babel" src="widgets-side.jsx"></script>
  <script type="text/babel" src="agent-deep-dive.jsx"></script>
  <script type="text/babel" src="dashboard.jsx"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>

  <script type="text/babel" data-presets="react">
    function DashboardFrame({ variant }) {
      return (
        <div className="dashboard-root" data-screen-label={`Lord Helm · ${variant}`}>
          <Dashboard variant={variant} />
        </div>
      );
    }

    function App() {
      return (
        <window.DesignCanvas
          title="Lord Helm"
          subtitle="Command Center dashboard — 3 layout variants. Click an artboard's ⤢ to go fullscreen."
          initialZoom={0.55}
        >
          <window.DCSection id="layouts" title="Layouts">
            <window.DCArtboard id="default"  label="Default — balanced command view"   width={1440} height={960}>
              <DashboardFrame variant="default" />
            </window.DCArtboard>
            <window.DCArtboard id="compact"  label="Compact — fleet-first w/ chat rail" width={1440} height={960}>
              <DashboardFrame variant="compact" />
            </window.DCArtboard>
            <window.DCArtboard id="incident" label="Incident — alerts-first triage"     width={1440} height={960}>
              <DashboardFrame variant="incident" />
            </window.DCArtboard>
          </window.DCSection>
        </window.DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
